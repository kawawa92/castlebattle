<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>城戦履歴ジャンプ</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #222;
    }
    .bar {
      display: flex;
      gap: 6px;
      padding: 8px;
      background: #222;
    }
    input {
      width: 110px;
      font-size: 16px;
    }
    button {
      font-size: 14px;
      padding: 4px 12px;
    }
  </style>
</head>
<body>

<div class="bar">
  <input id="date" value="20260614" placeholder="日付">
  <input id="crp" value="160" placeholder="crp" type="number">
  <button onclick="openPage()">表示</button>
</div>

<script>
function openPage() {
  const date = document.getElementById("date").value.trim();
  const crp = document.getElementById("crp").value.trim();

  if (!crp) {
    alert("crpを入力してください");
    return;
  }

  const useDate = date || "20260614";

  const innerUrl =
    "https://mbga-sp.daisenran.jp/castle_battle/castle_battle_history.aspx" +
    "?mi=" + encodeURIComponent(useDate) +
    "&crp=" + encodeURIComponent(crp) +
    "&rnd=0";

  const fullUrl =
    "https://g12010355.sp.pf.mbga.jp/?url=" +
    encodeURIComponent(innerUrl) +
    "&guid=ON";

  location.href = fullUrl;
}
</script>

</body>
</html>
