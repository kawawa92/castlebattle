<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>城戦履歴ジャンプ</title>

<style>
body {
    margin: 0;
    padding: 20px;
    background: #222;
    color: white;
    font-family: sans-serif;
}

.container {
    max-width: 350px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

input {
    font-size: 30px;
    padding: 14px;
    border-radius: 10px;
    border: none;
    box-sizing: border-box;
}

button {
    font-size: 28px;
    padding: 14px;
    border-radius: 50px;
    border: none;
    background: #ffffff;
}
</style>

</head>

<body>

<div class="container">

<input 
    id="date"
    placeholder="日付 YYYYMMDD">

<input 
    id="crp"
    placeholder="crp番号"
    type="number">

<button onclick="openPage()">
    表示
</button>

</div>


<script>

// 今日の日付を YYYYMMDD で取得
function getToday() {
    const d = new Date();

    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");

    return `${y}${m}${day}`;
}


// 起動時：保存日付または今日をセット
window.onload = function() {

    const savedDate = localStorage.getItem("castleDate");

    document.getElementById("date").value =
        savedDate || getToday();

};


// URL生成して移動
function openPage() {

    const date =
        document.getElementById("date")
        .value.trim();

    const crp =
        document.getElementById("crp")
        .value.trim();


    if (!crp) {
        alert("crp番号を入力してください");
        return;
    }


    // 日付保存
    localStorage.setItem(
        "castleDate",
        date
    );


    const innerUrl =
        "https://mbga-sp.daisenran.jp/castle_battle/castle_battle_history.aspx"
        + "?mi=" + encodeURIComponent(date)
        + "&crp=" + encodeURIComponent(crp)
        + "&rnd=0";


    const url =
        "https://g12010355.sp.pf.mbga.jp/?url="
        + encodeURIComponent(innerUrl)
        + "&guid=ON";


    location.href = url;
}


// crp入力でEnter
document.getElementById("crp")
?.addEventListener("keydown", function(e) {

    if (e.key === "Enter") {
        openPage();
    }

});

</script>

</body>
</html>
