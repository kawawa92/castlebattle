<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>城戦履歴ジャンプ</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111;
      color: white;
    }
    .bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      display: flex;
      gap: 6px;
      padding: 6px;
      box-sizing: border-box;
      background: #222;
      z-index: 9999;
    }
    input {
      width: 100px;
      font-size: 14px;
    }
    button {
      font-size: 14px;
    }
    iframe {
      position: fixed;
      top: 44px;
      left: 0;
      width: 100%;
      height: calc(100vh - 44px);
      border: 0;
      background: white;
    }
  </style>
</head>
<body>

<div class="bar">
  <input id="date" placeholder="日付 20260614">
  <input id="crp" placeholder="crp" type="number">
  <button onclick="openPage()">表示</button>
</div>

<iframe id="view"></iframe>

<script>
let currentDate = "20260614";

function openPage() {
  const dateInput = document.getElementById("date").value.trim();
  const crp = document.getElementById("crp").value.trim();

  if (!crp) {
    alert("crpを入力してください");
    return;
  }

  if (dateInput) {
    currentDate = dateInput;
  }

  const innerUrl =
    "https://mbga-sp.daisenran.jp/castle_battle/castle_battle_history.aspx" +
    "?mi=" + encodeURIComponent(currentDate) +
    "&crp=" + encodeURIComponent(crp) +
    "&rnd=0";

  const fullUrl =
    "https://g12010355.sp.pf.mbga.jp/?url=" +
    encodeURIComponent(innerUrl) +
    "&guid=ON";

  document.getElementById("view").src = fullUrl;
}
</script>

</body>
</html>
